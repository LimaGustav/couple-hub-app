<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoveSync - Login</title>
    <!-- Fonte moderna do Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #FDF3F5;
            --primary-maroon: #9C1C46;
            --primary-light-pink: #FCE6EC;
            --text-dark: #2D2D2D;
            --text-muted: #757575;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* --- FORMAS ABSTRATAS DE FUNDO (Inspiradas no print original) --- */
        .bg-shape {
            position: absolute;
            background-color: #FCEBEF;
            border-radius: 50%;
            z-index: 1;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            top: -150px;
            right: -100px;
            opacity: 0.7;
        }

        .shape-2 {
            width: 250px;
            height: 250px;
            bottom: -50px;
            left: -50px;
            opacity: 0.5;
        }

        .shape-3 {
            width: 20px;
            height: 20px;
            top: 30%;
            left: 15%;
            background-color: var(--primary-light-pink);
        }

        .shape-4 {
            width: 12px;
            height: 12px;
            bottom: 25%;
            right: 15%;
            background-color: var(--primary-light-pink);
        }

        /* --- CARD DE LOGIN --- */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 24px;
        }

        .login-card {
            background-color: var(--white);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 12px 40px rgba(156, 28, 70, 0.04);
            border: 1px solid rgba(252, 230, 236, 0.5);
            text-align: center;
        }

        /* Logo & Cabeçalho */
        .brand {
            margin-bottom: 32px;
        }

        .brand h1 {
            font-size: 26px;
            color: var(--primary-maroon);
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .brand span {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            display: block;
            margin-top: 4px;
        }

        .welcome-text {
            margin-bottom: 24px;
        }

        .welcome-text h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .welcome-text p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Formulário */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            font-size: 16px;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 14px 16px 14px 44px;
            font-size: 14px;
            border-radius: 12px;
            border: 1px solid #EAEAEA;
            background-color: #FAFAFA;
            color: var(--text-dark);
            outline: none;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: var(--primary-maroon);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(156, 28, 70, 0.08);
        }

        /* Opções Extras (Lembrar-me / Esqueci a senha) */
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 28px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .remember-me input {
            accent-color: var(--primary-maroon);
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .forgot-password {
            color: var(--primary-maroon);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* Botão de Ação */
        .btn-login {
            background-color: var(--primary-maroon);
            color: var(--white);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(156, 28, 70, 0.2);
        }

        .btn-login:hover {
            opacity: 0.95;
        }

        .btn-login:active {
            transform: scale(0.99);
        }

        /* Rodapé do Card */
        .card-footer {
            margin-top: 28px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .card-footer a {
            color: var(--primary-maroon);
            text-decoration: none;
            font-weight: 600;
        }

        .card-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Elementos visuais de fundo -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>
    <div class="bg-shape shape-4"></div>

    <!-- Container do Login -->
    <div class="login-wrapper">
        <div class="login-card">
            
            <!-- Logo baseado no cabeçalho do menu lateral -->
            <div class="brand">
                <h1>❤️ LoveSync</h1>
                <span>O Hub do Casal</span>
            </div>

            <!-- Boas-vindas -->
            <div class="welcome-text">
                <h2>Bem-vindo de volta!</h2>
                <p>Entre para se conectar com o seu amor</p>
            </div>

            <!-- Formulário -->
            <form onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="email">E-mail de acesso</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✉️</span>
                        <input type="email" id="email" class="form-control" placeholder="exemplo@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Sua senha</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>

                <!-- Opções extras -->
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Lembrar de mim
                    </label>
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                </div>

                <!-- Botão Principal -->
                <button type="submit" class="btn-login">Entrar no Hub</button>
            </form>

            <!-- Link de Cadastro -->
            <div class="card-footer">
                Ainda não tem conta? <a href="#">Cadastre o casal</a>
            </div>

        </div>
    </div>

</body>
</html>
